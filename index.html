<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESC Hub · Software Updates</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#29abab;--ink:#222;--muted:#777;--amber:#b8860b;--line:#e6e6e6}
*{box-sizing:border-box}body{font-family:'Poppins',sans-serif;margin:0;color:var(--ink);background:#f7f9f9}
header{background:var(--teal);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;margin:0;font-weight:600}
.round{font-size:13px;background:rgba(255,255,255,.18);padding:6px 12px;border-radius:20px}
.round.ready{background:#fff;color:var(--teal);font-weight:600}
.tabs{max-width:920px;margin:20px auto 0;padding:0 16px;display:flex;gap:8px}
.tab{font-size:13px;font-family:inherit;padding:6px 16px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
.tab.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:600}
main{max-width:920px;margin:14px auto 32px;padding:0 16px;display:grid;gap:12px}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:18px}
.card .left{flex:1;min-width:0}
.card h2{font-size:16px;margin:0 0 7px;font-weight:600;line-height:1.3}
.meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:12px;padding:3px 10px;border-radius:20px}.pill.draft{background:#eee;color:#666}.pill.published{background:#e3f5e8;color:#1a7f37}
.chip{font-size:11px;color:var(--teal);border:1px solid var(--teal);border-radius:20px;padding:2px 8px}.chip.comm{background:var(--teal);color:#fff;border:0}
.flagchip{font-size:11px;background:#fff8e6;border:1px solid #f0d98c;color:var(--amber);border-radius:20px;padding:2px 8px}
.date{font-size:12px;color:var(--muted)}
.right{display:flex;gap:8px;align-items:center;flex-shrink:0}
button{font-family:inherit;font-size:14px;border-radius:8px;padding:8px 16px;border:1px solid var(--teal);cursor:pointer;background:#fff;color:var(--teal)}
button:disabled{opacity:.45;cursor:not-allowed}
.right button,.right a.live{min-width:104px;text-align:center;padding:8px 14px}
.right a.live{font-size:14px;border-radius:8px;border:1px solid var(--teal);background:var(--teal);color:#fff;text-decoration:none;display:inline-block;line-height:1.45;white-space:nowrap}
.right button.publish{background:var(--teal);color:#fff;border:1px solid var(--teal)}
.right button.confirm{background:#c0392b;border-color:#c0392b;color:#fff}
.clink{font-size:12px;color:var(--teal)}
.login{max-width:380px;margin:12vh auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center}
.login input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;margin:12px 0}
.muted{color:var(--muted);font-size:13px}
.boot{max-width:380px;margin:14vh auto;text-align:center;color:var(--muted);font-size:14px}
.panel{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9}.panel.open{display:flex}
.sheet{background:#fff;width:min(820px,94vw);height:90vh;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.sheet .top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
.sheet .top strong{flex:1;min-width:0;font-size:16px}
.etitle{flex:1;min-width:0;font-family:inherit;font-size:16px;font-weight:600;padding:7px 10px;border:1px solid var(--line);border-radius:6px}
.topact{display:flex;gap:8px;align-items:center;flex-shrink:0}
.topact button{font-size:13px;padding:6px 12px}
.topact button.publish{background:var(--teal);color:#fff;border-color:var(--teal)}
#flagbar:not(:empty){padding:12px 28px 0}
#aibar{padding:12px 28px;border-bottom:1px solid var(--line);gap:8px;align-items:center}
#aiinstr{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
#aibar button{flex-shrink:0}
.preview{flex:1;overflow:auto;padding:22px 28px;font-size:16px;line-height:1.6;color:#222}
.preview img{display:block;max-width:100%;height:auto;margin:34px auto}
.preview h2{font-size:22px;margin-top:1.5em}
.preview[contenteditable=true]{outline:2px solid var(--teal);outline-offset:-4px;background:#fffdf6}
@media(max-width:560px){.card{flex-direction:column;align-items:flex-start}.right{width:100%}}
</style></head><body>
<div id="app"><div class="boot">Loading the hub…</div></div>
<div class="panel" id="panel"><div class="sheet">
  <div class="top">
    <input id="etitle" class="etitle" style="display:none">
    <strong id="st"></strong>
    <div class="topact">
      <button id="okbtn" class="publish" onclick="window._clearflag()" style="display:none">Mark checked ✓</button>
      <button id="editbtn" onclick="window._edit()">Edit</button>
      <button id="savebtn" class="publish" onclick="window._save()" style="display:none">Save</button>
      <button id="cancelbtn" onclick="window._cancel()" style="display:none">Cancel</button>
      <button onclick="window._close()">✕</button>
    </div>
  </div>
  <div id="flagbar"></div>
  <div id="aibar" style="display:none"><input id="aiinstr" placeholder="Tell the AI what to change… (e.g. shorten the intro, drop the last section, make it warmer)"><button id="aibtn" class="publish" onclick="window._aiedit()">Ask AI</button></div>
  <div id="pbody" class="preview"></div>
</div></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://gmqysuxbjucyiqfdddzu.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtcXlzdXhianVjeWlxZmRkZHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODQ0MzUsImV4cCI6MjA5Nzc2MDQzNX0._PmftWsju9T0SiCafVvTm1g8Hq3aV_0Na9gKZbvSxoY';
const API = SUPABASE_URL + '/functions/v1/hub';
const sb = createClient(SUPABASE_URL, ANON_KEY);
const app = document.getElementById('app');
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s));
const fmt = d => { if(!d) return ''; const t=Date.parse(d); if(isNaN(t)) return ''; return new Date(t).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); };
const api = async (q,opts={}) => { const {data:{session}}=await sb.auth.getSession(); return fetch(API+q,{...opts,headers:{...(opts.headers||{}),Authorization:'Bearer '+(session?.access_token||'')}}); };

let STATE = { items: [] };
let FILTER = 'pending';
let CUR = null;

function loginView(msg){ app.innerHTML = "<div class=login><h2 style='color:#29abab'>ESC Hub · Software Updates</h2><p class=muted>Sign in with your email — we'll send a magic link.</p><input id=em type=email placeholder='you@escapepreneur.com'><button onclick='window._login()' style='width:100%'>Send magic link</button><p class=muted id=msg>"+esc(msg)+"</p></div>"; }
function errorView(e){ app.innerHTML = "<div class=login><h2 style='color:#29abab'>ESC Hub · Software Updates</h2><p class=muted>Couldn't load the hub just now.</p><p class=muted>"+esc(e)+"</p><button onclick='location.reload()' style='width:100%'>Reload</button></div>"; }

let rendering=false, again=false;
async function render(){
  if(rendering){ again=true; return; }
  rendering=true;
  try{ await draw(); }
  catch(e){ errorView(e && e.message || e); }
  finally{ rendering=false; if(again){ again=false; render(); } }
}
async function draw(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){
    const hp = new URLSearchParams(location.hash.slice(1));
    const err = hp.get('error_description');
    loginView(err ? decodeURIComponent(err.replace(/\+/g,' '))+' — request a new link below.' : '');
    return;
  }
  app.innerHTML = "<header><h1>ESC Hub · Software Updates</h1><span id=round class=round>…</span></header><div class=tabs id=tabs></div><main id=list>Loading…</main>";
  const q = await (await api('?action=queue')).json();
  if(q.error) throw new Error(q.error);
  STATE.items = q.items || [];
  const r=$('round'); r.textContent='Community round-up: '+q.communityLive+'/'+q.communityThreshold+' live'; r.className='round'+(q.communityLive>=q.communityThreshold?' ready':'');
  renderTabs(); renderList();
}
function renderTabs(){
  const pend = STATE.items.filter(i=>i.status!=='Published').length;
  const publ = STATE.items.filter(i=>i.status==='Published').length;
  const defs = [['pending','Pending',pend],['published','Published',publ],['all','All',STATE.items.length]];
  $('tabs').innerHTML = defs.map(([k,label,n])=>"<button class='tab"+(FILTER===k?' active':'')+"' onclick=\"window._filter('"+k+"')\">"+label+" ("+n+")</button>").join('');
}
function ts(i){ return i.status==='Published' ? (i.publishedAt?Date.parse(i.publishedAt):0) : (i.changelogDate?Date.parse(i.changelogDate):0); }
function renderList(){
  let list = STATE.items.slice();
  if(FILTER==='pending') list = list.filter(i=>i.status!=='Published');
  else if(FILTER==='published') list = list.filter(i=>i.status==='Published');
  list.sort((a,b)=>{ if(FILTER==='all'){ const ap=a.status!=='Published', bp=b.status!=='Published'; if(ap!==bp) return ap?-1:1; } return (ts(b)||0)-(ts(a)||0); });
  $('list').innerHTML = list.map(card).join('') || "<p class=muted>Nothing here.</p>";
}
function card(it){ const pub=it.status==='Published';
  const chips=(it.categories||[]).map(c=>'<span class=chip>'+esc(c)+'</span>').join('')+(it.community?'<span class="chip comm">Community</span>':'');
  const dtxt = pub ? (it.publishedAt?'Published '+fmt(it.publishedAt):'Published') : (it.changelogDate?'Changelog '+fmt(it.changelogDate):'Changelog');
  const date = (!pub && it.sourceLink) ? "<a class=clink href='"+esc(it.sourceLink)+"' target=_blank>"+dtxt+" ↗</a>" : "<span class=date>"+dtxt+"</span>";
  const flag = it.flag?"<span class=flagchip>⚑ "+esc(it.flag)+"</span>":"";
  const actions = "<button onclick=\"window._review('"+it.key+"',"+pub+")\">Review</button>"
    + (pub ? "<a class=live href='"+esc(it.liveUrl)+"' target=_blank>View live ↗</a>"
           : "<button class=publish "+(it.flag?'disabled':'')+" onclick=\"window._pub('"+it.key+"',this)\">Publish</button>");
  return "<div class=card><div class=left><h2>"+esc(it.title)+"</h2><div class=meta><span class='pill "+(pub?'published':'draft')+"'>"+(pub?'Published':'Pending')+"</span>"+chips+flag+date+"</div></div><div class=right>"+actions+"</div></div>";
}
function setEdit(on){
  $('etitle').style.display = on?'block':'none';
  $('st').style.display = on?'none':'block';
  $('aibar').style.display = on?'flex':'none';
  $('okbtn').style.display = (!on && CUR && CUR.flag) ? 'inline-block':'none';
  $('editbtn').style.display = on?'none':(CUR&&CUR.editable?'inline-block':'none');
  $('savebtn').style.display = on?'inline-block':'none';
  $('cancelbtn').style.display = on?'inline-block':'none';
  $('pbody').contentEditable = on?'true':'false';
  if(on) $('etitle').value = CUR.title||'';
}
window._filter=(k)=>{ FILTER=k; renderTabs(); renderList(); };
window._login=async()=>{ const email=$('em').value; const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}}); $('msg').textContent=error?error.message:'Check your inbox for the link.'; };
window._close=()=>$('panel').classList.remove('open');
window._review=async(key,isPub)=>{ try{
  const d=await (await api('?action=post&key='+key)).json();
  CUR={ key, title:d.title||'', body_html:d.body_html||'', flag:d.flag||null, editable:!isPub };
  $('st').textContent=d.title||'Preview';
  $('flagbar').innerHTML = d.flag?"<div style='background:#fff8e6;border:1px solid #f0d98c;color:#b8860b;padding:10px;border-radius:8px'>⚑ "+esc(d.flag)+"</div>":"";
  $('pbody').innerHTML = d.body_html||'';
  setEdit(false);
  $('panel').classList.add('open');
}catch(e){ alert('Could not load preview: '+(e.message||e)); } };
window._clearflag=async()=>{ const b=$('okbtn'); b.disabled=true; b.textContent='…'; try{ const res=await (await api('?action=save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,flag:null})})).json(); if(res.ok){ CUR.flag=null; $('flagbar').innerHTML=''; b.style.display='none'; render(); } else alert('Failed: '+(res.error||'?')); }catch(e){ alert('Failed: '+(e.message||e)); } finally{ b.disabled=false; b.textContent='Mark checked ✓'; } };
window._aiedit=async()=>{ const instruction=$('aiinstr').value.trim(); if(!instruction)return; const btn=$('aibtn'); btn.disabled=true; btn.textContent='Thinking…'; try{ const res=await (await api('?action=ai-edit',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,instruction})})).json(); if(res.error){ alert('AI edit failed: '+res.error); } else { if(res.title) $('etitle').value=res.title; if(res.body_html) $('pbody').innerHTML=res.body_html; $('aiinstr').value=''; } }catch(e){ alert('AI edit failed: '+(e.message||e)); } finally{ btn.disabled=false; btn.textContent='Ask AI'; } };
window._edit=()=>setEdit(true);
window._cancel=()=>{ $('pbody').innerHTML = CUR.body_html||''; setEdit(false); };
window._save=async()=>{
  const title=$('etitle').value.trim(); const body=$('pbody').innerHTML;
  const b=$('savebtn'); b.disabled=true; b.textContent='Saving…';
  try{
    const res=await (await api('?action=save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,title,body_html:body})})).json();
    if(res.ok){ CUR.title=title; CUR.body_html=body; $('st').textContent=title; setEdit(false); render(); }
    else alert('Save failed: '+(res.error||'?'));
  }catch(e){ alert('Save failed: '+(e.message||e)); }
  finally{ b.disabled=false; b.textContent='Save'; }
};
window._pub=async(key,btn)=>{
  if(btn.dataset.armed!=='1'){ btn.dataset.armed='1'; btn.textContent='Confirm?'; btn.classList.add('confirm'); clearTimeout(btn._t); btn._t=setTimeout(()=>{btn.dataset.armed='0';btn.textContent='Publish';btn.classList.remove('confirm');},4000); return; }
  clearTimeout(btn._t); btn.disabled=true; btn.textContent='Publishing…';
  const reset=()=>{btn.disabled=false;btn.dataset.armed='0';btn.textContent='Publish';btn.classList.remove('confirm');};
  try{ const res=await (await api('?action=publish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key})})).json(); if(res.ok){render()}else{alert('Failed: '+(res.error||'?'));reset();} }
  catch(e){ alert('Failed: '+(e.message||e)); reset(); }
};
sb.auth.onAuthStateChange(()=>render());
render();
</script></body></html>
