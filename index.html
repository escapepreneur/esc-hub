<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESC Hub · Content</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#29abab;--ink:#222;--muted:#777;--amber:#b8860b;--line:#e6e6e6}
*{box-sizing:border-box}body{font-family:'Poppins',sans-serif;margin:0;color:var(--ink);background:#f7f9f9}
header{background:var(--teal);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;margin:0;font-weight:600}
header button.ghelp{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.65);font-size:13px;padding:7px 16px;font-family:inherit;border-radius:8px;cursor:pointer}
.guide h3{color:var(--teal);font-size:17px;margin:20px 0 6px}
.guide h3:first-of-type{margin-top:0}
.guide p.lead{color:var(--muted);margin:2px 0 8px}
.guide ol{margin:0 0 6px;padding-left:22px}
.guide li{margin:8px 0;line-height:1.55}
.guide .tip{background:#eef9f9;border:1px solid var(--teal);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:14px}
#wt{position:fixed;top:0;right:0;bottom:0;width:340px;max-width:100vw;background:#fff;border-left:1px solid var(--line);box-shadow:-6px 0 24px rgba(0,0,0,.10);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;z-index:20}
#wt.open{transform:none}
body.wt-open .shell{padding-right:356px}
#wt .wtop{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--teal);color:#fff;flex-shrink:0}
#wt .wtop strong{font-size:15px}
#wt .wtop button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.6);font-size:13px;padding:5px 11px;border-radius:8px;font-family:inherit;cursor:pointer}
#wt .wtbody{flex:1;overflow:auto;padding:18px 16px}
.wtprog{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
.wtbar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:16px}
.wtbar i{display:block;height:100%;background:var(--teal);transition:width .2s}
.wtstep{font-size:15px;line-height:1.65;color:var(--ink)}
.wtstep strong{font-weight:600}
.wtlead{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 14px}
.wtchoose button{display:block;width:100%;margin:10px 0;padding:14px;text-align:left;font-size:14px;font-weight:600}
#wt .wtfoot{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0}
#wt .wtfoot button{flex:1}
#wt .wtfoot button.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
@media(max-width:620px){#wt{width:100%}body.wt-open .shell{padding-right:16px}}
.shell{max-width:1080px;margin:0 auto;display:flex;gap:0;align-items:flex-start}
.side{width:240px;flex-shrink:0;padding:20px 12px;display:flex;flex-direction:column;gap:8px}
.navbtn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px 14px;font-size:14px;color:var(--ink);cursor:pointer;font-family:inherit}
.navbtn.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:600}
.badge{font-size:12px;background:var(--teal);color:#fff;border-radius:20px;padding:1px 9px;min-width:24px;text-align:center;font-weight:600}
.navbtn.active .badge{background:#fff;color:var(--teal)}
.badge.ready{background:#c0392b;color:#fff}
.content{flex:1;min-width:0;padding:20px 16px 40px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{font-size:13px;font-family:inherit;padding:6px 16px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
.tab.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:600}
.listwrap{display:grid;gap:12px}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:18px}
.card .left{flex:1;min-width:0}
.card h2{font-size:16px;margin:0 0 7px;font-weight:600;line-height:1.3}
.meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:12px;padding:3px 10px;border-radius:20px}.pill.draft{background:#eee;color:#666}.pill.published{background:#e3f5e8;color:#1a7f37}
.chip{font-size:11px;color:var(--teal);border:1px solid var(--teal);border-radius:20px;padding:2px 8px}.chip.comm{background:var(--teal);color:#fff;border:0}
.flagchip{font-size:11px;background:#fff8e6;border:1px solid #f0d98c;color:var(--amber);border-radius:20px;padding:2px 8px}
.date{font-size:12px;color:var(--muted)}
.right{display:flex;gap:8px;align-items:center;flex-shrink:0}
button{font-family:inherit;font-size:14px;border-radius:8px;padding:8px 16px;border:1px solid var(--teal);cursor:pointer;background:#fff;color:var(--teal)}
button:disabled{opacity:.45;cursor:not-allowed}
.right button,.right a.live{min-width:104px;text-align:center;padding:8px 14px}
.right a.live{font-size:14px;border-radius:8px;border:1px solid var(--teal);background:var(--teal);color:#fff;text-decoration:none;display:inline-block;line-height:1.45;white-space:nowrap}
.right button.publish{background:var(--teal);color:#fff;border:1px solid var(--teal)}
.right button.confirm{background:#c0392b;border-color:#c0392b;color:#fff}
.clink{font-size:12px;color:var(--teal)}
.secthead{font-size:18px;font-weight:600;margin:0 0 4px}
.cstatus{color:var(--muted);font-size:14px;margin-bottom:16px}
.cwhich{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5}
.settings{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);flex-wrap:wrap}
.settings input{width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
.login{max-width:380px;margin:12vh auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center}
.login input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;margin:12px 0}
.muted{color:var(--muted);font-size:13px}
.boot{max-width:380px;margin:14vh auto;text-align:center;color:var(--muted);font-size:14px}
.panel{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9}.panel.open{display:flex}
.sheet{background:#fff;width:min(820px,94vw);height:90vh;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.sheet .top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
.sheet .top strong{flex:1;min-width:0;font-size:16px}
.etitle{flex:1;min-width:0;font-family:inherit;font-size:16px;font-weight:600;padding:7px 10px;border:1px solid var(--line);border-radius:6px}
.topact{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.topact button{font-size:13px;padding:6px 12px}
.topact button.publish{background:var(--teal);color:#fff;border-color:var(--teal)}
.topact button.common{background:var(--teal);color:#fff;border-color:var(--teal)}
.topact button.confirm{background:#c0392b;border-color:#c0392b;color:#fff}
#flagbar:not(:empty){padding:12px 28px 0}
#aibar{padding:12px 28px;border-bottom:1px solid var(--line);gap:8px;align-items:center}
#aiinstr{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
#aibar button{flex-shrink:0}
.preview{flex:1;overflow:auto;padding:22px 28px;font-size:16px;line-height:1.6;color:#222}
.preview img{display:block;max-width:100%;height:auto;margin:34px auto}
.preview h2{font-size:22px;margin-top:1.5em}
.preview .labs-callout{background:#eef9f9;border:1px solid #29abab;border-left:5px solid #29abab;border-radius:8px;padding:14px 20px;margin:24px 0}
.preview[contenteditable=true]{outline:2px solid var(--teal);outline-offset:-4px;background:#fffdf6}
.rtitlebar{display:flex;align-items:center;gap:10px;padding:12px 28px;border-bottom:1px solid var(--line)}
.rtitlebar label{font-size:13px;color:var(--muted);flex-shrink:0}
.rtitlebar input{flex:1;min-width:0;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:14px}
.rtitlebar button{flex-shrink:0}
.rgraphic{display:flex;align-items:center;gap:18px;padding:16px 28px;border-bottom:1px solid var(--line);background:#fafdfd}
.rgraphic img{width:170px;height:auto;border-radius:8px;border:1px solid var(--line);display:block}
.rgraphic .rgtext{font-size:13px;color:var(--muted);flex:1}
.dl{display:inline-block;margin-top:8px;background:var(--teal);color:#fff;border:1px solid var(--teal);border-radius:8px;padding:8px 14px;font-size:13px;text-decoration:none}
@media(max-width:620px){.shell{flex-direction:column}.side{width:100%;flex-direction:row;flex-wrap:wrap}.navbtn{width:auto;flex:1}.card{flex-direction:column;align-items:flex-start}.right{width:100%}.rgraphic{flex-direction:column;align-items:flex-start}}
</style></head><body>
<div id="app"><div class="boot">Loading the hub…</div></div>

<!-- Post review modal -->
<div class="panel" id="panel"><div class="sheet">
  <div class="top">
    <input id="etitle" class="etitle" style="display:none">
    <strong id="st"></strong>
    <div class="topact">
      <button id="okbtn" class="publish" onclick="window._clearflag()" style="display:none">Mark checked ✓</button>
      <button id="pubbtn" class="publish" onclick="window._pubModal(this)" style="display:none">Publish</button>
      <button id="markbtn" onclick="window._markPublished(this)" style="display:none">Mark as published</button>
      <button id="unpubbtn" onclick="window._unpublish(this)" style="display:none">Unpublish</button>
      <button id="commbtn" onclick="window._community(this)" style="display:none">Add to community</button>
      <button id="editbtn" onclick="window._edit()">Edit</button>
      <button id="savebtn" class="publish" onclick="window._save()" style="display:none">Save</button>
      <button id="cancelbtn" onclick="window._cancel()" style="display:none">Cancel</button>
      <button onclick="window._close()">✕</button>
    </div>
  </div>
  <div id="flagbar"></div>
  <div id="aibar" style="display:none"><input id="aiinstr" placeholder="Tell the AI what to change… (e.g. shorten the intro, drop the last section, make it warmer)"><button id="aibtn" class="publish" onclick="window._aiedit()">Ask AI</button></div>
  <div id="pbody" class="preview"></div>
</div></div>

<!-- Community round-up modal -->
<div class="panel" id="rpanel"><div class="sheet">
  <div class="top">
    <strong>Community round-up</strong>
    <div class="topact">
      <button onclick="window._openRoundup()">Regenerate</button>
      <button id="rcopy" class="publish" onclick="window._roundCopy()">Copy post text</button>
      <button onclick="window.open('https://www.escapepreneurcentral.com/communities/groups/the-escape-club/channels/Software-Updates-2rD4n','_blank','noopener')">Open community ↗</button>
      <button id="rposted" onclick="window._roundPosted(this)">Mark as posted</button>
      <button onclick="window._rclose()">✕</button>
    </div>
  </div>
  <div class="rtitlebar"><label>Title</label><input id="rtitle" placeholder="Post title"><button onclick="window._copyTitle(this)">Copy title</button></div>
  <div class="rgraphic">
    <img src="roundup-graphic.webp" alt="ESC Hub Software Updates graphic">
    <div class="rgtext">This graphic goes on every community round-up. Download it, then attach it to your post.<br>
      <a class="dl" href="roundup-graphic.webp" download="ESC Hub - Software Updates.webp">Download image</a></div>
  </div>
  <div id="rbody" class="preview" contenteditable="true"></div>
</div></div>

<!-- Walkthrough rail (docked right, stays open while you work) -->
<div id="wt">
  <div class="wtop"><strong>Walkthrough</strong><button onclick="window._wtClose()">Close ✕</button></div>
  <div class="wtbody" id="wtbody"></div>
  <div class="wtfoot" id="wtfoot" style="display:none"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://gmqysuxbjucyiqfdddzu.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtcXlzdXhianVjeWlxZmRkZHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODQ0MzUsImV4cCI6MjA5Nzc2MDQzNX0._PmftWsju9T0SiCafVvTm1g8Hq3aV_0Na9gKZbvSxoY';
const API = SUPABASE_URL + '/functions/v1/hub';
const sb = createClient(SUPABASE_URL, ANON_KEY);
const app = document.getElementById('app');
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s));
const fmt = d => { if(!d) return ''; const t=Date.parse(d); if(isNaN(t)) return ''; return new Date(t).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); };
const api = async (q,opts={}) => { const {data:{session}}=await sb.auth.getSession(); return fetch(API+q,{...opts,headers:{...(opts.headers||{}),Authorization:'Bearer '+(session?.access_token||'')}}); };
const getJSON = async (q,opts) => (await api(q,opts)).json();

let STATE = { items: [], communityLive: 0, communityThreshold: 5 };
let VIEW = 'updates';
let FILTER = 'pending';
let CUR = null;
let ROUND = { keys: [] };

function loginView(msg){ app.innerHTML = "<div class=login><h2 style='color:#29abab'>ESC Hub · Content</h2><p class=muted>Sign in with your email — we'll send a magic link.</p><input id=em type=email placeholder='you@escapepreneur.com'><button onclick='window._login()' style='width:100%'>Send magic link</button><p class=muted id=msg>"+esc(msg)+"</p></div>"; }
function errorView(e){ app.innerHTML = "<div class=login><h2 style='color:#29abab'>ESC Hub · Content</h2><p class=muted>Couldn't load the hub just now.</p><p class=muted>"+esc(e)+"</p><button onclick='location.reload()' style='width:100%'>Reload</button></div>"; }

let rendering=false, again=false;
async function render(){
  if(rendering){ again=true; return; }
  rendering=true;
  try{ await draw(); }
  catch(e){ errorView(e && e.message || e); }
  finally{ rendering=false; if(again){ again=false; render(); } }
}
async function draw(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){
    const hp = new URLSearchParams(location.hash.slice(1));
    const err = hp.get('error_description');
    loginView(err ? decodeURIComponent(err.replace(/\+/g,' '))+' — request a new link below.' : '');
    return;
  }
  app.innerHTML = "<header><h1>ESC Hub · Content</h1><button class=ghelp onclick=\"window._guide()\">Guide</button></header><div class=shell><nav class=side id=side></nav><div class=content id=content>Loading…</div></div>";
  const q = await getJSON('?action=queue');
  if(q.error) throw new Error(q.error);
  STATE = { items: q.items||[], communityLive: q.communityLive||0, communityThreshold: q.communityThreshold||5 };
  renderSide(); renderView();
}
function renderSide(){
  const n=STATE.communityLive, ready=n>=STATE.communityThreshold;
  $('side').innerHTML =
    "<button class='navbtn"+(VIEW==='updates'?' active':'')+"' onclick=\"window._view('updates')\">Software updates</button>"+
    "<button class='navbtn"+(VIEW==='community'?' active':'')+"' onclick=\"window._view('community')\"><span>Community posts</span>"+
      (n?"<span class='badge"+(ready?' ready':'')+"'>"+n+"</span>":"")+"</button>";
}
function renderView(){ if(VIEW==='community') renderCommunity(); else renderUpdates(); }
window._view=(v)=>{ VIEW=v; renderSide(); renderView(); };

// --- Software updates view ---
function renderUpdates(){
  $('content').innerHTML = "<div class=tabs id=tabs></div><div id=list class=listwrap></div>";
  renderTabs(); renderList();
}
function renderTabs(){
  const pend = STATE.items.filter(i=>i.status!=='Published').length;
  const publ = STATE.items.filter(i=>i.status==='Published').length;
  const defs = [['pending','Pending',pend],['published','Published',publ],['all','All',STATE.items.length]];
  $('tabs').innerHTML = defs.map(([k,label,n])=>"<button class='tab"+(FILTER===k?' active':'')+"' onclick=\"window._filter('"+k+"')\">"+label+" ("+n+")</button>").join('');
}
function ts(i){ return i.status==='Published' ? (i.publishedAt?Date.parse(i.publishedAt):0) : (i.changelogDate?Date.parse(i.changelogDate):0); }
function renderList(){
  let list = STATE.items.slice();
  if(FILTER==='pending') list = list.filter(i=>i.status!=='Published');
  else if(FILTER==='published') list = list.filter(i=>i.status==='Published');
  list.sort((a,b)=>{ if(FILTER==='all'){ const ap=a.status!=='Published', bp=b.status!=='Published'; if(ap!==bp) return ap?-1:1; } return (ts(b)||0)-(ts(a)||0); });
  $('list').innerHTML = list.map(card).join('') || "<p class=muted>Nothing here.</p>";
}
function card(it){ const pub=it.status==='Published';
  const chips=(it.categories||[]).map(c=>'<span class=chip>'+esc(c)+'</span>').join('')+(it.community?'<span class="chip comm">Community</span>':'');
  const dtxt = pub ? (it.publishedAt?'Published '+fmt(it.publishedAt):'Published') : (it.changelogDate?'Changelog '+fmt(it.changelogDate):'Changelog');
  const date = (!pub && it.sourceLink) ? "<a class=clink href='"+esc(it.sourceLink)+"' target=_blank>"+dtxt+" ↗</a>" : "<span class=date>"+dtxt+"</span>";
  const flag = it.flag?"<span class=flagchip>⚑ "+esc(it.flag)+"</span>":"";
  const actions = "<button onclick=\"window._review('"+it.key+"',"+pub+")\">Review</button>"
    + (pub ? "<a class=live href='"+esc(it.liveUrl)+"' target=_blank>View live ↗</a>" : "");
  return "<div class=card><div class=left><h2>"+esc(it.title)+"</h2><div class=meta><span class='pill "+(pub?'published':'draft')+"'>"+(pub?'Published':'Pending')+"</span>"+chips+flag+date+"</div></div><div class=right>"+actions+"</div></div>";
}
window._filter=(k)=>{ FILTER=k; renderTabs(); renderList(); };

// --- Community posts view ---
async function renderCommunity(){
  $('content').innerHTML = "<div class=secthead>Community posts</div><p class=muted>Loading…</p>";
  let r;
  try{ r = await getJSON('?action=roundup'); }catch(e){ $('content').innerHTML="<p class=muted>Couldn't load: "+esc(e.message||e)+"</p>"; return; }
  if(r.error){ $('content').innerHTML="<p class=muted>"+esc(r.error)+"</p>"; return; }
  const ready = r.total >= r.size;
  let h = "<div class=secthead>Community posts</div>";
  h += "<div class=cstatus>"+(r.total ? (r.total+" community post"+(r.total===1?'':'s')+" waiting"+(ready?" — round-up ready to post":" (round-up runs at "+r.size+")")) : "No community posts waiting yet. Flag a published post as Community to add it.")+"</div>";
  if(r.batch.length){
    h += "<div class=card><div class=left><h2>Round-up "+(ready?'ready':'preview')+" — "+r.batch.length+" post"+(r.batch.length===1?'':'s')+"</h2>"+
         "<div class=cwhich>"+r.batch.map(b=>esc(b.title)).join('  ·  ')+"</div></div>"+
         "<div class=right><button class=publish onclick='window._openRoundup()'>Review round-up</button></div></div>";
  }
  h += "<div class=settings><span>Compile a round-up every</span><input id=rsize type=number min=1 max=50 value="+r.size+"><span>community posts</span><button onclick='window._saveSettings(this)'>Save</button></div>";
  $('content').innerHTML = h;
}
window._saveSettings=async(btn)=>{
  const n=parseInt($('rsize').value,10); if(!(n>=1&&n<=50)){ alert('Enter a number from 1 to 50.'); return; }
  btn.disabled=true; const o=btn.textContent; btn.textContent='Saving…';
  try{ const res=await getJSON('?action=settings',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({roundupSize:n})}); if(res.ok){ render(); } else { alert('Failed: '+(res.error||'?')); btn.disabled=false; btn.textContent=o; } }
  catch(e){ alert('Failed: '+(e.message||e)); btn.disabled=false; btn.textContent=o; }
};
window._openRoundup=async()=>{
  ROUND={keys:[]};
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}).replace(',','');
  $('rtitle').value='Software Update - '+today;
  $('rbody').innerHTML='<p class=muted>Composing the round-up… this takes a few seconds.</p>';
  $('rpanel').classList.add('open');
  try{
    const res=await getJSON('?action=roundup-compose',{method:'POST',headers:{'content-type':'application/json'},body:'{}'});
    if(res.error){ $('rbody').innerHTML="<p class=muted>Couldn't compose: "+esc(res.error)+"</p>"; return; }
    ROUND={keys:res.keys||[]};
    $('rbody').innerHTML=res.html||'';
  }catch(e){ $('rbody').innerHTML="<p class=muted>Couldn't compose: "+esc(e.message||e)+"</p>"; }
};
window._rclose=()=>$('rpanel').classList.remove('open');
const WT_UPDATES=[
  "On the left, click <strong>Software updates</strong>.",
  "In the <strong>Pending</strong> tab, pick a post and click <strong>Review</strong>.",
  "Read it through.",
  "Happy as-is? Skip ahead. Want changes? Click <strong>Edit</strong>.",
  "Type the change in <strong>Ask AI</strong> and click <strong>Ask AI</strong> — or edit the text yourself.",
  "Click <strong>Save</strong>.",
  "If you see a <strong>⚑ flag</strong>: check the images, then click <strong>Mark checked ✓</strong>.",
  "Click <strong>Publish</strong>.",
  "Click <strong>Confirm publish?</strong> &nbsp;It's now live. ✅"
];
const WT_COMMUNITY=[
  "On the left, click <strong>Community posts</strong>.",
  "Click <strong>Review round-up</strong> and wait a moment for the draft.",
  "Read it. Tweak it if you like, or click <strong>Regenerate</strong>.",
  "Click <strong>Download image</strong>.",
  "Click <strong>Open community ↗</strong> and start a new post.",
  "Click <strong>Copy title</strong>, then paste it into the title box.",
  "Click <strong>Copy post text</strong>, paste it into the body, and attach the image.",
  "Post it in the community.",
  "Back here, click <strong>Mark as posted</strong>, then <strong>Confirm — posted?</strong> &nbsp;Done. ✅"
];
let WT={flow:null,step:0};
function renderWT(){
  const steps = WT.flow==='updates'?WT_UPDATES:WT.flow==='community'?WT_COMMUNITY:null;
  let body, foot='';
  if(!steps){
    body="<p class=wtlead>What are you doing? Pick one and I'll walk you through it, step by step. This panel stays open while you work.</p>"+
      "<div class=wtchoose><button class=primary onclick=\"window._wtFlow('updates')\">Publish software updates</button>"+
      "<button class=primary onclick=\"window._wtFlow('community')\">Post a community round-up</button></div>";
  } else if(WT.step>=steps.length){
    body="<div class=wtstep><p><strong>All done. 🎉</strong></p><p>That's the whole flow.</p></div>";
    foot="<button onclick='window._wtHome()'>Start again</button><button class=primary onclick='window._wtClose()'>Close</button>";
  } else {
    const n=steps.length,i=WT.step;
    body="<div class=wtprog>Step "+(i+1)+" of "+n+"</div><div class=wtbar><i style='width:"+Math.round((i/n)*100)+"%'></i></div><div class=wtstep>"+steps[i]+"</div>";
    foot=(i>0?"<button onclick='window._wtBack()'>Back</button>":"<button onclick='window._wtHome()'>⟵ Menu</button>")+
         "<button class=primary onclick='window._wtNext()'>"+(i===n-1?"Finish ✓":"I've done that ✓")+"</button>";
  }
  $('wtbody').innerHTML=body;
  const f=$('wtfoot'); f.innerHTML=foot; f.style.display=foot?'flex':'none';
}
window._guide=()=>{ WT={flow:null,step:0}; renderWT(); $('wt').classList.add('open'); document.body.classList.add('wt-open'); };
window._wtClose=()=>{ $('wt').classList.remove('open'); document.body.classList.remove('wt-open'); };
window._wtHome=()=>{ WT={flow:null,step:0}; renderWT(); };
window._wtFlow=(f)=>{ WT={flow:f,step:0}; renderWT(); };
window._wtNext=()=>{ WT.step++; renderWT(); };
window._wtBack=()=>{ WT.step=Math.max(0,WT.step-1); renderWT(); };
window._copyTitle=async(btn)=>{ try{ await navigator.clipboard.writeText($('rtitle').value); const o=btn.textContent; btn.textContent='Copied ✓'; setTimeout(()=>btn.textContent=o,2000);}catch(e){ alert('Copy failed: '+(e.message||e)); } };
window._roundCopy=async()=>{
  const html=$('rbody').innerHTML, text=$('rbody').innerText;
  const b=$('rcopy'); const o=b.textContent;
  try{
    if(navigator.clipboard && window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([text],{type:'text/plain'})})]);
    } else { await navigator.clipboard.writeText(text); }
    b.textContent='Copied ✓'; setTimeout(()=>b.textContent=o,2000);
  }catch(e){ alert('Copy failed: '+(e.message||e)); }
};
window._roundPosted=async(btn)=>{
  if(!ROUND.keys.length){ alert('Nothing to mark yet.'); return; }
  if(btn.dataset.armed!=='1'){ btn.dataset.armed='1'; btn.textContent='Confirm — posted?'; btn.classList.add('confirm'); clearTimeout(btn._t); btn._t=setTimeout(()=>{btn.dataset.armed='0';btn.textContent='Mark as posted';btn.classList.remove('confirm');},4000); return; }
  clearTimeout(btn._t); btn.disabled=true; btn.textContent='Saving…';
  const reset=()=>{btn.disabled=false;btn.dataset.armed='0';btn.textContent='Mark as posted';btn.classList.remove('confirm');};
  try{ const res=await getJSON('?action=roundup-posted',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({keys:ROUND.keys})}); if(res.ok){ window._rclose(); render(); } else { alert('Failed: '+(res.error||'?')); reset(); } }
  catch(e){ alert('Failed: '+(e.message||e)); reset(); }
};

// --- Post review modal ---
function setEdit(on){
  $('etitle').style.display = on?'block':'none';
  $('st').style.display = on?'none':'block';
  $('aibar').style.display = on?'flex':'none';
  $('okbtn').style.display = (!on && CUR && CUR.flag) ? 'inline-block':'none';
  $('pubbtn').style.display = (!on && CUR && CUR.editable) ? 'inline-block':'none';
  $('pubbtn').disabled = !!(CUR && CUR.flag);
  $('markbtn').style.display = (!on && CUR && CUR.editable) ? 'inline-block':'none';
  $('unpubbtn').style.display = (!on && CUR && !CUR.editable) ? 'inline-block':'none';
  if(!on && CUR){ const cb=$('commbtn'); cb.style.display='inline-block'; cb.textContent=CUR.community?'In community ✓':'Add to community'; cb.classList.toggle('common', !!CUR.community); }
  else $('commbtn').style.display='none';
  $('editbtn').style.display = on?'none':(CUR&&CUR.editable?'inline-block':'none');
  $('savebtn').style.display = on?'inline-block':'none';
  $('cancelbtn').style.display = on?'inline-block':'none';
  $('pbody').contentEditable = on?'true':'false';
  if(on) $('etitle').value = CUR.title||'';
}
window._login=async()=>{ const email=$('em').value; const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}}); $('msg').textContent=error?error.message:'Check your inbox for the link.'; };
window._close=()=>$('panel').classList.remove('open');
window._review=async(key,isPub)=>{ try{
  const d=await getJSON('?action=post&key='+key);
  CUR={ key, title:d.title||'', body_html:d.body_html||'', flag:d.flag||null, community:!!d.community, editable:!isPub };
  $('st').textContent=d.title||'Preview';
  $('flagbar').innerHTML = d.flag?"<div style='background:#fff8e6;border:1px solid #f0d98c;color:#b8860b;padding:10px;border-radius:8px'>⚑ "+esc(d.flag)+"</div>":"";
  $('pbody').innerHTML = d.body_html||'';
  setEdit(false);
  $('panel').classList.add('open');
}catch(e){ alert('Could not load preview: '+(e.message||e)); } };
window._clearflag=async()=>{ const b=$('okbtn'); b.disabled=true; b.textContent='…'; try{ const res=await getJSON('?action=save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,flag:null})}); if(res.ok){ CUR.flag=null; $('flagbar').innerHTML=''; b.style.display='none'; $('pubbtn').disabled=false; render(); } else alert('Failed: '+(res.error||'?')); }catch(e){ alert('Failed: '+(e.message||e)); } finally{ b.disabled=false; b.textContent='Mark checked ✓'; } };
window._aiedit=async()=>{ const instruction=$('aiinstr').value.trim(); if(!instruction)return; const btn=$('aibtn'); btn.disabled=true; btn.textContent='Thinking…'; try{ const res=await getJSON('?action=ai-edit',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,instruction})}); if(res.error){ alert('AI edit failed: '+res.error); } else { if(res.title) $('etitle').value=res.title; if(res.body_html) $('pbody').innerHTML=res.body_html; $('aiinstr').value=''; } }catch(e){ alert('AI edit failed: '+(e.message||e)); } finally{ btn.disabled=false; btn.textContent='Ask AI'; } };
window._edit=()=>setEdit(true);
window._cancel=()=>{ $('pbody').innerHTML = CUR.body_html||''; setEdit(false); };
window._save=async()=>{
  const title=$('etitle').value.trim(); const body=$('pbody').innerHTML;
  const b=$('savebtn'); b.disabled=true; b.textContent='Saving…';
  try{
    const res=await getJSON('?action=save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,title,body_html:body})});
    if(res.ok){ CUR.title=title; CUR.body_html=body; $('st').textContent=title; setEdit(false); render(); }
    else alert('Save failed: '+(res.error||'?'));
  }catch(e){ alert('Save failed: '+(e.message||e)); }
  finally{ b.disabled=false; b.textContent='Save'; }
};
window._pubModal=async(btn)=>{
  if(btn.dataset.armed!=='1'){ btn.dataset.armed='1'; btn.textContent='Confirm publish?'; btn.classList.add('confirm'); clearTimeout(btn._t); btn._t=setTimeout(()=>{btn.dataset.armed='0';btn.textContent='Publish';btn.classList.remove('confirm');},4000); return; }
  clearTimeout(btn._t); btn.disabled=true; btn.textContent='Publishing…';
  const reset=()=>{btn.disabled=false;btn.dataset.armed='0';btn.textContent='Publish';btn.classList.remove('confirm');};
  try{ const res=await getJSON('?action=publish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key})}); if(res.ok){ window._close(); render(); } else { alert('Publish failed: '+(res.error||'?')); reset(); } }
  catch(e){ alert('Publish failed: '+(e.message||e)); reset(); }
};
window._unpublish=async(btn)=>{
  if(btn.dataset.armed!=='1'){ btn.dataset.armed='1'; btn.textContent='Confirm unpublish?'; btn.classList.add('confirm'); clearTimeout(btn._t); btn._t=setTimeout(()=>{btn.dataset.armed='0';btn.textContent='Unpublish';btn.classList.remove('confirm');},4000); return; }
  clearTimeout(btn._t); btn.disabled=true; btn.textContent='Unpublishing…';
  const reset=()=>{btn.disabled=false;btn.dataset.armed='0';btn.textContent='Unpublish';btn.classList.remove('confirm');};
  try{ const res=await getJSON('?action=unpublish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key})}); if(res.ok){ window._close(); render(); } else { alert('Unpublish failed: '+(res.error||'?')); reset(); } }
  catch(e){ alert('Unpublish failed: '+(e.message||e)); reset(); }
};
window._community=async(btn)=>{
  const next=!CUR.community; btn.disabled=true; const old=btn.textContent; btn.textContent='…';
  try{ const res=await getJSON('?action=save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,community:next})}); if(res.ok){ CUR.community=next; btn.textContent=next?'In community ✓':'Add to community'; btn.classList.toggle('common',next); render(); } else { alert('Failed: '+(res.error||'?')); btn.textContent=old; } }
  catch(e){ alert('Failed: '+(e.message||e)); btn.textContent=old; }
  finally{ btn.disabled=false; }
};
window._markPublished=async(btn)=>{
  const liveUrl=(prompt('Live URL for this post (where it has been published):','')||'').trim();
  if(!liveUrl) return;
  btn.disabled=true; const old=btn.textContent; btn.textContent='Marking…';
  try{ const res=await getJSON('?action=mark-published',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key:CUR.key,liveUrl})}); if(res.ok){ window._close(); render(); } else { alert('Mark as published failed: '+(res.error||'?')); btn.disabled=false; btn.textContent=old; } }
  catch(e){ alert('Mark as published failed: '+(e.message||e)); btn.disabled=false; btn.textContent=old; }
};
sb.auth.onAuthStateChange(()=>render());
render();
</script></body></html>
